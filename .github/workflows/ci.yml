name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install ruff
        run: python -m pip install --upgrade pip && pip install ruff
      - name: Run ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install test deps
        run: python -m pip install --upgrade pip && pip install pytest && pip install -r requirements.txt || true
      - name: Diagnose api-mode subprocess
        run: |
          echo "=== audit.py api-mode subprocess stdout/stderr ==="
          python audit.py --mode api --endpoint http://127.0.0.1:19999/v1 --api-key test-key --model test-model --target test/fixtures/deploy-hardened --profile default --output json --quiet > /tmp/audit_stdout.txt 2>/tmp/audit_stderr.txt || true
          echo "--- STDOUT (first 200 bytes) ---"
          head -c 200 /tmp/audit_stdout.txt || echo "(empty)"
          echo "--- STDERR ---"
          cat /tmp/audit_stderr.txt || echo "(empty)"
          echo "=== end diagnostic ==="
      - name: Run tests (if any)
        run: |
          if [ -d "tests" ] || [ -d "test" ]; then
            pytest -q
          else
            echo "No tests found, skipping pytest"
          fi

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mark-sentinel:ci
