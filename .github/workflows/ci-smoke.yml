name: CI - smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Make scripts executable
        run: |
          chmod +x ./scripts/install.sh
          chmod +x ./scripts/generate_pdf.sh || true
      - name: Run installer (smoke)
        run: |
          ./scripts/install.sh
      - name: Run unit tests (smoke)
        run: |
          . .venv/bin/activate
          pip install pytest
          pytest -q test/test_gemini_hash_connectors.py -q

  smoke-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Validate customer-facing installer scripts (parse + encoding)
        shell: powershell
        run: |
          # These are the scripts actually served to customers at /install/<file>
          # (admin/install.ps1, admin/install.bat — synced from the repo root).
          # Run under Windows PowerShell 5.1 (the stock interpreter on a fresh
          # Windows machine, NOT pwsh) since 5.1 reads .ps1 files without a
          # UTF-8 BOM using the system ANSI codepage — non-ASCII characters
          # (em-dashes, box-drawing dividers, etc.) get corrupted on read and
          # produce a wall of unrelated "Unexpected token" parse errors.
          $failed = $false
          foreach ($f in @("install.ps1", "uninstall.ps1", "admin\install.ps1")) {
            $tokens = $null; $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($f, [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              Write-Host "PARSE ERRORS in $f using Windows PowerShell $($PSVersionTable.PSVersion):" -ForegroundColor Red
              $errors | ForEach-Object { Write-Host "  $_" -ForegroundColor Red }
              $failed = $true
            } else {
              Write-Host "OK: $f parses cleanly under PowerShell $($PSVersionTable.PSVersion)" -ForegroundColor Green
            }
          }
          foreach ($f in @("install.ps1", "install.bat", "uninstall.ps1", "uninstall.bat", "admin\install.ps1", "admin\install.bat")) {
            $bytes = [System.IO.File]::ReadAllBytes($f)
            $nonAscii = $bytes | Where-Object { $_ -gt 127 }
            if ($nonAscii.Count -gt 0) {
              Write-Host "NON-ASCII BYTES in $f -- will corrupt under PS 5.1 without a UTF-8 BOM" -ForegroundColor Red
              $failed = $true
            } else {
              Write-Host "OK: $f is pure ASCII" -ForegroundColor Green
            }
          }
          if ($failed) { exit 1 }
      - name: Run installer (PowerShell)
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\install.ps1
      - name: Run unit tests (smoke)
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install pytest --quiet
          .\.venv\Scripts\pytest.exe -q test/test_gemini_hash_connectors.py -q
      - name: Verify audit.py runs on Windows
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe audit.py --mode config --profile smb --target test\fixtures\deploy-hardened --output plain --quiet
          if ($LASTEXITCODE -eq 1) { exit 0 }
