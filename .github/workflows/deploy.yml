name: Build & Deploy

on:
  push:
    branches: [feat/user-manager, main]
    paths:
      - 'agent.py'
      - 'discovery.py'
      - 'server.py'
      - 'audit.py'
      - 'checks/**'
      - 'connectors/**'
      - 'profiles/**'
      - 'scripts/Dockerfile.build'
      - 'requirements.txt'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compile binaries (linux/amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file scripts/Dockerfile.build \
            --output type=local,dest=dist \
            .
          echo "=== Built binaries ==="
          ls -lh dist/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: beta

      - name: Upload binaries and source to GCP
        run: |
          gcloud compute scp \
            dist/agent dist/audit \
            server.py discovery.py agent.py \
            mark-sentinel:/tmp/ \
            --zone=us-central1-a \
            --project=infra-analyzer-496922-p0 \
            --tunnel-through-iap \
            --quiet

      - name: Deploy to sentinel container
        run: |
          gcloud compute ssh mark-sentinel \
            --zone=us-central1-a \
            --project=infra-analyzer-496922-p0 \
            --tunnel-through-iap \
            --quiet \
            --command="
              set -e
              sudo docker cp /tmp/agent     sentinel-mfdynamicsllc:/app/agent
              sudo docker cp /tmp/audit     sentinel-mfdynamicsllc:/app/audit
              sudo docker cp /tmp/server.py sentinel-mfdynamicsllc:/app/server.py
              sudo docker cp /tmp/discovery.py sentinel-mfdynamicsllc:/app/discovery.py
              sudo docker cp /tmp/agent.py  sentinel-mfdynamicsllc:/app/agent.py
              sudo docker restart sentinel-mfdynamicsllc
              sleep 4
              sudo docker ps --filter name=sentinel-mfdynamicsllc --format 'Status: {{.Status}}'
              rm -f /tmp/agent /tmp/audit /tmp/server.py /tmp/discovery.py /tmp/agent.py
            "
