version: "3.8"
services:
  ai-service:
    image: acmecorp/ai-assistant:1.0.0
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      APP_ENV: production

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: aiassistant
      POSTGRES_USER: admin
