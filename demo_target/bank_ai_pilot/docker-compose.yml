version: '3.8'

services:
  ai-assistant:
    image: pnc-ai-assistant:latest
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=sk-fake-prod-key-abcdef1234567890abcdef1234567890
      - ANTHROPIC_API_KEY=sk-ant-fake-prod-key-xyz789abcdef1234567890
      - DATABASE_URL=postgresql://admin:PncProd2026!@db:5432/ai_db
