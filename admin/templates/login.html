<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.A.R.K. Sentinel — Login</title>
<script>
  (function() {
    var t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
:root {
  --bg:          #f0f4ff;
  --bg-card:     #ffffff;
  --bg-input:    #f7f9ff;
  --border:      #ccd3e8;
  --border-in:   #9aaacf;
  --text:        #0f1e3d;
  --text-sub:    #3a4f7a;
  --placeholder: #7a8aaa;
  --accent:      #f5a623;
  --accent-hov:  #e09410;
  --accent-btn:  #1a2f5a;
  --err-txt:     #b91c1c;
  --err-bg:      #fff0f0;
  --err-bdr:     #fca5a5;
  --focus-bdr:   #f5a62380;
  --toggle-c:    #3a4f7a;
  --shadow:      0 4px 24px rgba(26,47,90,0.12);
}
[data-theme="dark"] {
  --bg:        #0e1525;
  --bg-card:   #162040;
  --bg-input:  #0e1525;
  --border:    #1e2d50;
  --border-in: #253a6a;
  --text:      #e8edf8;
  --text-sub:  #6a7fa8;
  --accent:    #f5a623;
  --accent-hov:#e09410;
  --accent-btn:#0e1525;
  --err-txt:   #ff6666;
  --err-bg:    #3a1010;
  --err-bdr:   #6a2020;
  --focus-bdr: #f5a62360;
  --toggle-c:  #4a5a80;
  --shadow:    0 4px 24px rgba(0,0,0,0.40);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, color .2s;
}
.login-wrap {
  width: 100%;
  max-width: 420px;
  padding: 24px;
}
.brand {
  text-align: center;
  margin-bottom: 32px;
}
.brand-name {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: 4px;
  line-height: 1;
}
.brand-name span { color: var(--accent); }
.brand-sub {
  font-size: 13px;
  color: var(--text-sub);
  letter-spacing: 2px;
  margin-top: 6px;
  text-transform: uppercase;
}
.card {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 36px 32px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.form-group { margin-bottom: 20px; }
label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: .3px;
}
input {
  background: var(--bg-input);
  border: 1.5px solid var(--border-in);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 15px;
  width: 100%;
  transition: border-color .15s;
}
input:focus { outline: none; border-color: var(--focus-bdr); }
input::placeholder { color: var(--placeholder); opacity: 1; }
.btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: var(--accent-btn);
  font-weight: 700;
  font-family: inherit;
  font-size: 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 8px;
  letter-spacing: .5px;
  transition: background .15s;
}
.btn:hover { background: var(--accent-hov); }
.error {
  font-size: 13px;
  margin-bottom: 18px;
  padding: 10px 14px;
  background: var(--err-bg);
  border: 1px solid var(--err-bdr);
  border-radius: 6px;
  color: var(--err-txt);
}
.bottom-row {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 20px;
}
.theme-toggle {
  background: none;
  border: 1px solid var(--border-in);
  color: var(--toggle-c);
  font-family: inherit;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: color .15s, border-color .15s;
}
.theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-name">M.A.R.K. <span>SENTINEL</span></div>
    <div class="brand-sub">Security Intelligence Platform</div>
  </div>
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
  <div class="bottom-row" style="margin-top:16px;margin-bottom:0">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">Dark mode</button>
  </div>
</div>
<script>
  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('theme-btn').textContent = next === 'light' ? 'Dark mode' : 'Light mode';
  }
  document.getElementById('theme-btn').textContent =
    document.documentElement.getAttribute('data-theme') === 'light' ? 'Dark mode' : 'Light mode';
</script>
</body>
</html>
