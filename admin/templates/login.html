<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.A.R.K. Sentinel — Login</title>
<script>
  (function() {
    var t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
:root {
  --bg:          #f0f4ff;
  --bg-card:     #ffffff;
  --bg-input:    #f7f9ff;
  --border:      #ccd3e8;
  --border-in:   #8a9abf;
  --text:        #0a1428;
  --text-sub:    #1e3060;
  --placeholder: #5a6a8a;
  --accent:      #f5a623;
  --accent-hov:  #e09410;
  --accent-btn:  #1a2f5a;
  --err-txt:     #b91c1c;
  --err-bg:      #fff0f0;
  --err-bdr:     #fca5a5;
  --focus-bdr:   #f5a62380;
  --toggle-c:    #1e3060;
  --shadow:      0 4px 24px rgba(26,47,90,0.12);
}
[data-theme="dark"] {
  --bg:        #0e1525;
  --bg-card:   #162040;
  --bg-input:  #0e1525;
  --border:    #1e2d50;
  --border-in: #3d5585;
  --text:      #f0f4ff;
  --text-sub:  #b0c4e8;
  --accent:    #f5a623;
  --accent-hov:#e09410;
  --accent-btn:#0e1525;
  --err-txt:   #ff6666;
  --err-bg:    #3a1010;
  --err-bdr:   #6a2020;
  --focus-bdr: #f5a62360;
  --toggle-c:  #b0c4e8;
  --shadow:    0 4px 24px rgba(0,0,0,0.40);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 18px;
  background: #F9FAFB;
  color: #111827;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, color .2s;
}
.login-wrap {
  width: 100%;
  max-width: 500px;
  padding: 28px;
}
.brand {
  text-align: center;
  margin-bottom: 36px;
}
.brand-name {
  font-size: 42px;
  font-weight: 800;
  color: #111827;
  letter-spacing: 4px;
  line-height: 1;
}
.brand-name span { color: #4F46E5; }
.brand-sub {
  font-size: 16px;
  color: #6B7280;
  letter-spacing: 2px;
  margin-top: 10px;
  text-transform: uppercase;
}
.card {
  background: #ffffff;
  border-radius: 12px;
  padding: 40px 36px;
  box-shadow: rgba(0,0,0,0.06);
  border: 1px solid #E5E7EB;
}
.form-group { margin-bottom: 24px; }
label {
  display: block;
  font-size: 17px;
  font-weight: 700;
  color: #111827;
  margin-bottom: 10px;
  letter-spacing: .3px;
}
input {
  background: #F9FAFB;
  border: 2px solid #E5E7EB;
  color: #111827;
  padding: 15px 18px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 18px;
  width: 100%;
  transition: border-color .15s;
}
input:focus { outline: none; border-color: #4F46E5; }
input::placeholder { color: #9CA3AF; opacity: 1; }
.btn {
  width: 100%;
  padding: 17px;
  background: #4F46E5;
  color: #4F46E5;
  font-weight: 700;
  font-family: inherit;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  letter-spacing: .5px;
  transition: background .15s;
}
.btn:hover { background: #4338CA; }
.error {
  font-size: 16px;
  margin-bottom: 20px;
  padding: 12px 16px;
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 6px;
  color: #DC2626;
}
.bottom-row {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 20px;
}
.theme-toggle {
  background: none;
  border: 1px solid #E5E7EB;
  color: #6B7280;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: 20px;
  cursor: pointer;
  transition: color .15s, border-color .15s;
}
.theme-toggle:hover { color: #4F46E5; border-color: #4F46E5; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-name">M.A.R.K. <span>SENTINEL</span></div>
    <div class="brand-sub">Security Intelligence Platform</div>
  </div>
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
      <div style="text-align:center;margin-top:18px">
        <a href="/forgot-password" style="font-size:15px;color:#6B7280;text-decoration:none">Forgot your password?</a>
      </div>
    </form>
  </div>
  <div class="bottom-row" style="margin-top:16px;margin-bottom:0">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">Dark mode</button>
  </div>
</div>
<script>
  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('theme-btn').textContent = next === 'light' ? 'Dark mode' : 'Light mode';
  }
  document.getElementById('theme-btn').textContent =
    document.documentElement.getAttribute('data-theme') === 'light' ? 'Dark mode' : 'Light mode';
</script>
</body>
</html>
