<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.A.R.K. Sentinel — Admin</title>
<script>
  (function() {
    var t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
:root {
  --bg:         #0a0a0a;
  --bg-nav:     #111;
  --bg-card:    #111;
  --bg-input:   #0d0d0d;
  --border:     #1c1c1c;
  --border-in:  #252525;
  --text:       #e0e0e0;
  --text-muted: #555;
  --text-dim:   #444;
  --text-td:    #ccc;
  --text-h1:    #fff;
  --tr-hover:   #131313;
  --td-border:  #141414;
  --accent:     #00ff88;
  --accent-hov: #00dd77;
  --accent-btn: #000;
  --link:       #4488ff;
  --danger-txt: #ff5555;
  --danger-bg:  #ff555515;
  --danger-bdr: #ff555530;
  --err-txt:    #ff5555;
  --err-bg:     #ff444410;
  --err-bdr:    #ff444430;
  --stat-num:   #00ff88;
  --empty:      #444;
  --focus-bdr:  #00ff8860;
}
[data-theme="light"] {
  --bg:         #f4f4f4;
  --bg-nav:     #ffffff;
  --bg-card:    #ffffff;
  --bg-input:   #f9f9f9;
  --border:     #e0e0e0;
  --border-in:  #d0d0d0;
  --text:       #1a1a1a;
  --text-muted: #888;
  --text-dim:   #aaa;
  --text-td:    #333;
  --text-h1:    #111;
  --tr-hover:   #f8f8f8;
  --td-border:  #eeeeee;
  --accent:     #00aa55;
  --accent-hov: #008844;
  --accent-btn: #ffffff;
  --link:       #2266cc;
  --danger-txt: #cc2222;
  --danger-bg:  #ff000008;
  --danger-bdr: #cc222220;
  --err-txt:    #cc2222;
  --err-bg:     #ff000008;
  --err-bdr:    #cc222220;
  --stat-num:   #00aa55;
  --empty:      #bbb;
  --focus-bdr:  #00aa5560;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 16px; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }
nav { background: var(--bg-nav); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; gap: 28px; }
.brand { color: var(--accent); font-weight: bold; font-size: 16px; letter-spacing: 3px; flex-shrink: 0; }
nav a { color: var(--text-muted); text-decoration: none; font-size: 15px; transition: color .15s; }
nav a:hover { color: var(--accent); }
.spacer { flex: 1; }
.nav-user { font-size: 14px; color: var(--text-dim); }
.theme-toggle { background: none; border: 1px solid var(--border-in); color: var(--text-muted); font-family: inherit; font-size: 14px; padding: 6px 14px; border-radius: 4px; cursor: pointer; transition: border-color .15s, color .15s; }
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
main { padding: 40px 36px; max-width: 1200px; margin: 0 auto; }
h1 { font-size: 24px; color: var(--text-h1); margin-bottom: 32px; letter-spacing: 1px; font-weight: 600; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 28px; margin-bottom: 28px; }
.card-title { font-size: 14px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; font-size: 15px; }
th { text-align: left; color: var(--text-muted); font-weight: 600; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; letter-spacing: .5px; text-transform: uppercase; }
td { padding: 13px 14px; border-bottom: 1px solid var(--td-border); color: var(--text-td); }
tr:hover td { background: var(--tr-hover); }
.badge { font-size: 12px; padding: 3px 10px; border-radius: 4px; display: inline-block; font-weight: 600; }
.badge-green { background: #00ff8818; color: #00cc66; border: 1px solid #00ff8830; }
.badge-red { background: #ff444418; color: #ff6666; border: 1px solid #ff444430; }
.badge-blue { background: #4488ff18; color: #6699ff; border: 1px solid #4488ff30; }
.badge-yellow { background: #ffaa0018; color: #ffbb33; border: 1px solid #ffaa0030; }
[data-theme="light"] .badge-green { background: #00aa5515; color: #007733; border-color: #00aa5530; }
[data-theme="light"] .badge-red { background: #ff000010; color: #cc2222; border-color: #ff000025; }
[data-theme="light"] .badge-blue { background: #2266cc15; color: #2255bb; border-color: #2266cc30; }
[data-theme="light"] .badge-yellow { background: #cc880015; color: #996600; border-color: #cc880030; }
.btn { display: inline-block; padding: 10px 20px; border-radius: 6px; font-size: 15px; font-family: inherit; cursor: pointer; border: none; text-decoration: none; letter-spacing: .3px; font-weight: 600; }
.btn-primary { background: var(--accent); color: var(--accent-btn); }
.btn-primary:hover { background: var(--accent-hov); }
.btn-danger { background: var(--danger-bg); color: var(--danger-txt); border: 1px solid var(--danger-bdr); font-size: 14px; padding: 7px 14px; }
.btn-danger:hover { background: var(--danger-bg); filter: brightness(1.2); }
.btn-sm { padding: 7px 14px; font-size: 14px; }
.form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-top: 8px; }
.form-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 160px; }
label { font-size: 14px; color: var(--text-muted); letter-spacing: .5px; font-weight: 600; }
input, select { background: var(--bg-input); border: 1px solid var(--border-in); color: var(--text); padding: 11px 14px; border-radius: 6px; font-family: inherit; font-size: 15px; width: 100%; }
input:focus, select:focus { outline: none; border-color: var(--focus-bdr); }
.error { color: var(--err-txt); font-size: 15px; margin-bottom: 16px; padding: 12px 16px; background: var(--err-bg); border: 1px solid var(--err-bdr); border-radius: 4px; }
.grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 28px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 24px 28px; }
.stat-num { font-size: 48px; color: var(--stat-num); font-weight: bold; line-height: 1; }
.stat-label { font-size: 14px; color: var(--text-muted); margin-top: 8px; letter-spacing: .5px; text-transform: uppercase; font-weight: 600; }
.url { color: var(--link); font-size: 14px; }
.empty { color: var(--empty); font-size: 15px; text-align: center; padding: 32px; }
</style>
</head>
<body>
<nav>
  <span class="brand">M.A.R.K. SENTINEL</span>
  <a href="/dashboard">Dashboard</a>
  {% if user.role == 'super_admin' %}<a href="/customers">Customers</a>{% endif %}
  <a href="/users">Users</a>
  <span class="spacer"></span>
  <a href="/account" style="font-size:14px;color:var(--text-muted)">{{ user.email }}</a>
  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">Light</button>
  <a href="/logout" style="font-size:14px;padding:6px 14px;border:1px solid var(--danger)40;border-radius:4px;color:var(--danger-txt);background:var(--danger)10">Logout</a>
</nav>
<main>
{% block content %}{% endblock %}
</main>
<script>
  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('theme-btn').textContent = next === 'dark' ? 'Light' : 'Dark';
  }
  document.getElementById('theme-btn').textContent =
    document.documentElement.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark';
</script>
</body>
</html>
