version: '3.8'
services:
  ai-service:
    image: my-ai-service:1.2.3
    env_file: .env
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - internal
    # No ports exposed externally — accessible only via nginx reverse proxy

  nginx:
    image: nginx:1.25.3
    ports:
      - "127.0.0.1:443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/certs:ro
    networks:
      - internal
      - external

networks:
  internal:
    internal: true
  external:
