---
- name: M.A.R.K. Sentinel Agent — Deploy and configure
  hosts: all
  become: true
  gather_facts: true

  vars:
    sentinel_server:    "http://localhost:7331"
    sentinel_token:     "replace-with-your-secret-token"
    sentinel_profile:   "default"
    sentinel_target:    "."
    sentinel_interval:  3600
    sentinel_install_dir: "/opt/sentinel"
    sentinel_config_dir:  "/etc/sentinel"
    sentinel_config_file: "/etc/sentinel/agent_config.json"
    sentinel_service_name: "sentinel-agent"
    sentinel_user: "sentinel"
    sentinel_python_min_major: 3
    sentinel_python_min_minor: 11

  tasks:

    # ── Python 3.11+ installation ───────────────────────────────────────────

    - name: Install Python 3.11+ on Debian/Ubuntu
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3-pip
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Enable EPEL and install Python 3.11+ on RHEL/CentOS 8+
      block:
        - name: Install EPEL release
          dnf:
            name: epel-release
            state: present

        - name: Install Python 3.11
          dnf:
            name:
              - python3.11
              - python3-pip
            state: present
      when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 8

    - name: Install Python 3.11+ on RHEL/CentOS 7
      yum:
        name:
          - python3
          - python3-pip
        state: present
      when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int < 8

    - name: Install Python 3.11+ on macOS (via Homebrew)
      become: false
      community.general.homebrew:
        name: python@3.11
        state: present
      when: ansible_os_family == "Darwin"

    - name: Resolve python3 executable path
      command: >
        bash -c "for p in python3.13 python3.12 python3.11 python3; do
          command -v $p &>/dev/null &&
          ver=$($p -c 'import sys; print(\"%d%d\" % sys.version_info[:2])') &&
          [ \"$ver\" -ge 311 ] && echo $p && break;
        done"
      register: python_bin_result
      changed_when: false
      failed_when: python_bin_result.stdout == ""

    - name: Set python executable fact
      set_fact:
        sentinel_python: "{{ python_bin_result.stdout | trim }}"

    # ── System user ─────────────────────────────────────────────────────────

    - name: Create sentinel system user (Linux)
      user:
        name: "{{ sentinel_user }}"
        system: true
        shell: /sbin/nologin
        create_home: false
        comment: "M.A.R.K. Sentinel Agent"
      when: ansible_os_family != "Darwin"

    # ── Install files ────────────────────────────────────────────────────────

    - name: Create install directory
      file:
        path: "{{ sentinel_install_dir }}"
        state: directory
        owner: "{{ sentinel_user if ansible_os_family != 'Darwin' else 'root' }}"
        group: "{{ sentinel_user if ansible_os_family != 'Darwin' else 'wheel' }}"
        mode: "0755"

    - name: Copy agent source files
      copy:
        src: "{{ item }}"
        dest: "{{ sentinel_install_dir }}/{{ item | basename }}"
        mode: "0644"
      loop:
        - "{{ playbook_dir }}/../../agent.py"
        - "{{ playbook_dir }}/../../audit.py"
        - "{{ playbook_dir }}/../../audit_safe.py"
        - "{{ playbook_dir }}/../../storage.py"
        - "{{ playbook_dir }}/../../server.py"
        - "{{ playbook_dir }}/../../requirements.txt"
      ignore_errors: false

    - name: Make agent.py executable
      file:
        path: "{{ sentinel_install_dir }}/agent.py"
        mode: "0755"

    - name: Copy checks, connectors, and profiles directories
      copy:
        src: "{{ playbook_dir }}/../../{{ item }}/"
        dest: "{{ sentinel_install_dir }}/{{ item }}/"
        mode: preserve
      loop:
        - checks
        - connectors
        - profiles
      ignore_errors: true

    # ── Pip dependencies ─────────────────────────────────────────────────────

    - name: Install Python dependencies
      pip:
        requirements: "{{ sentinel_install_dir }}/requirements.txt"
        executable: "{{ sentinel_python | replace('python3', 'pip3') }}"
        extra_args: "--quiet"
      ignore_errors: true

    # ── Configuration ─────────────────────────────────────────────────────────

    - name: Create config directory
      file:
        path: "{{ sentinel_config_dir }}"
        state: directory
        owner: root
        group: "{{ sentinel_user if ansible_os_family != 'Darwin' else 'wheel' }}"
        mode: "0750"

    - name: Write agent config
      template:
        src: agent_config.json.j2
        dest: "{{ sentinel_config_file }}"
        owner: root
        group: "{{ sentinel_user if ansible_os_family != 'Darwin' else 'wheel' }}"
        mode: "0640"
        force: false
      notify: Restart sentinel service

    # ── Inline config template (written to disk if j2 is missing) ────────────

    - name: Write agent config (inline, no template file)
      copy:
        dest: "{{ sentinel_config_file }}"
        owner: root
        group: "{{ sentinel_user if ansible_os_family != 'Darwin' else 'wheel' }}"
        mode: "0640"
        force: false
        content: |
          {
            "server":   "{{ sentinel_server }}",
            "token":    "{{ sentinel_token }}",
            "target":   "{{ sentinel_target }}",
            "profile":  "{{ sentinel_profile }}",
            "interval": {{ sentinel_interval }}
          }
      notify: Restart sentinel service

    # ── systemd service (Linux) ───────────────────────────────────────────────

    - name: Install systemd unit file
      copy:
        src: "{{ playbook_dir }}/../sentinel-agent.service"
        dest: /etc/systemd/system/sentinel-agent.service
        owner: root
        group: root
        mode: "0644"
      when: ansible_os_family != "Darwin" and ansible_service_mgr == "systemd"
      notify:
        - Reload systemd
        - Restart sentinel service

    - name: Enable and start sentinel-agent (systemd)
      systemd:
        name: sentinel-agent
        enabled: true
        state: started
        daemon_reload: true
      when: ansible_os_family != "Darwin" and ansible_service_mgr == "systemd"

    # ── launchd daemon (macOS) ────────────────────────────────────────────────

    - name: Install launchd plist (macOS)
      copy:
        src: "{{ playbook_dir }}/../io.hash.sentinel-agent.plist"
        dest: /Library/LaunchDaemons/io.hash.sentinel-agent.plist
        owner: root
        group: wheel
        mode: "0644"
      when: ansible_os_family == "Darwin"
      notify: Reload launchd daemon

    - name: Load launchd daemon (macOS)
      command: launchctl load -w /Library/LaunchDaemons/io.hash.sentinel-agent.plist
      when: ansible_os_family == "Darwin"
      register: launchctl_load
      changed_when: launchctl_load.rc == 0
      failed_when: false

  handlers:

    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Restart sentinel service
      systemd:
        name: sentinel-agent
        state: restarted
      when: ansible_os_family != "Darwin" and ansible_service_mgr == "systemd"

    - name: Reload launchd daemon
      command: >
        bash -c "launchctl unload /Library/LaunchDaemons/io.hash.sentinel-agent.plist 2>/dev/null;
                 launchctl load -w /Library/LaunchDaemons/io.hash.sentinel-agent.plist"
      when: ansible_os_family == "Darwin"
