# M.A.R.K. Sentinel — Local Docker fleet demo
#
# Spins up three agent containers and one Ollama instance.
# Each agent reports to your central Sentinel server.
#
# Usage:
#   1. Copy .env.example to .env and fill in SENTINEL_SERVER and SENTINEL_TOKEN
#   2. docker compose up -d
#   3. Pull a small model into Ollama:
#        docker exec sentinel-ollama ollama pull tinyllama
#   4. Watch Connected Devices on your dashboard — three new entries appear.
#
# Environment variables (set in .env or export before running):
#   SENTINEL_SERVER   — full URL of your Sentinel server, e.g. http://192.168.1.146:7331
#   SENTINEL_TOKEN    — agent token from agent_token.txt on the server
#   SENTINEL_PROFILE  — scan profile (default, fedramp, cmmc, financial, smb)
#
# ── Sidecar pattern (for scanning an existing customer service) ─────────────
#
# If a customer already has containers running and cannot modify them, add the
# Sentinel agent as a sidecar: a separate container that mounts the host
# filesystem read-only and scans from outside.  Nothing about the existing
# containers changes — just append the sidecar service to their compose file.
#
# Example — drop this into the customer's existing docker-compose.yml:
#
#   sentinel-agent:
#     image: ghcr.io/hash-ai/sentinel-agent:latest
#     container_name: sentinel-agent
#     hostname: <customer-env-name>        # shows as device name on dashboard
#     restart: unless-stopped
#     environment:
#       SENTINEL_SERVER:      "http://<server-ip>:7331"
#       SENTINEL_AGENT_TOKEN: "<token>"
#       SENTINEL_DEVICE_ID:   "<customer-env-name>"   # stable ID across restarts
#     volumes:
#       - sentinel-state:/app/output       # persists device ID across restarts
#       - /:/host:ro                       # host filesystem, read-only
#     command:
#       - python
#       - agent.py
#       - --daemon
#       - --server
#       - "http://<server-ip>:7331"
#       - --token
#       - "<token>"
#       - --target
#       - /host                            # scan the mounted host root
#       - --profile
#       - "default"
#       - --interval
#       - "3600"
#
#   volumes:
#     sentinel-state:
#
# The agent scans /host (the real host filesystem) instead of /app, so it
# audits the actual server running the customer's containers — OS config,
# open ports, Docker daemon settings, etc.  One sidecar covers the whole host
# regardless of how many other containers are running on it.

services:

  # ── Ollama: local LLM endpoint ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sentinel-ollama
    hostname: sentinel-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Agent 1: scans the Ollama AI endpoint ───────────────────────────────────
  agent-ollama:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    container_name: sentinel-agent-ollama
    hostname: sentinel-agent-ollama
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
    environment:
      SENTINEL_SERVER:    "${SENTINEL_SERVER}"
      SENTINEL_AGENT_TOKEN: "${SENTINEL_TOKEN}"
      SENTINEL_DEVICE_ID: "agent-ollama"
      PYTHONUNBUFFERED:   "1"
    volumes:
      - agent-ollama-state:/app/output
    command:
      - python
      - agent.py
      - --daemon
      - --server
      - "${SENTINEL_SERVER}"
      - --token
      - "${SENTINEL_TOKEN}"
      - --target
      - /app
      - --profile
      - "${SENTINEL_PROFILE:-default}"
      - --interval
      - "3600"

  # ── Agent 2: general config scan, fedramp profile ───────────────────────────
  agent-fedramp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    container_name: sentinel-agent-fedramp
    hostname: sentinel-agent-fedramp
    restart: unless-stopped
    environment:
      SENTINEL_SERVER:      "${SENTINEL_SERVER}"
      SENTINEL_AGENT_TOKEN: "${SENTINEL_TOKEN}"
      SENTINEL_DEVICE_ID:   "agent-fedramp"
      PYTHONUNBUFFERED:     "1"
    volumes:
      - agent-fedramp-state:/app/output
    command:
      - python
      - agent.py
      - --daemon
      - --server
      - "${SENTINEL_SERVER}"
      - --token
      - "${SENTINEL_TOKEN}"
      - --target
      - /app
      - --profile
      - "fedramp"
      - --interval
      - "3600"

  # ── Agent 3: general config scan, cmmc profile ──────────────────────────────
  agent-cmmc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    container_name: sentinel-agent-cmmc
    hostname: sentinel-agent-cmmc
    restart: unless-stopped
    environment:
      SENTINEL_SERVER:      "${SENTINEL_SERVER}"
      SENTINEL_AGENT_TOKEN: "${SENTINEL_TOKEN}"
      SENTINEL_DEVICE_ID:   "agent-cmmc"
      PYTHONUNBUFFERED:     "1"
    volumes:
      - agent-cmmc-state:/app/output
    command:
      - python
      - agent.py
      - --daemon
      - --server
      - "${SENTINEL_SERVER}"
      - --token
      - "${SENTINEL_TOKEN}"
      - --target
      - /app
      - --profile
      - "cmmc"
      - --interval
      - "3600"

volumes:
  ollama-data:
  agent-ollama-state:
  agent-fedramp-state:
  agent-cmmc-state:
