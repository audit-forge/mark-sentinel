server {
    listen 7001;
    server_name _;

    location = /_auth {
        internal;
        proxy_pass http://sentinel-admin:8000/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Customer-ID mfdynamicsllc;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        auth_request /_auth;
        error_page 401 403 = @login_redirect;

        proxy_pass http://sentinel-mfdynamicsllc:7331;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
        proxy_buffering off;
    }

    location @login_redirect {
        return 302 http://35.255.19.236/login?next=http://$host:$server_port$request_uri;
    }
}
