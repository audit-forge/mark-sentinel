server {
    listen 7001;
    server_name _;

    location = /_auth {
        internal;
        proxy_pass http://sentinel-admin:8000/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Customer-ID mfdynamicsllc;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/agent/ {
        proxy_pass http://sentinel-mfdynamicsllc:7331;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
        proxy_buffering off;
    }

    location ~ ^/(bundle\.tar\.gz|agent\.py)$ {
        proxy_pass http://sentinel-mfdynamicsllc:7331;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /install/ {
        proxy_pass http://sentinel-admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        auth_request /_auth;
        error_page 401 403 = @login_redirect;
        auth_request_set $sentinel_user_email    $upstream_http_x_sentinel_user_email;
        auth_request_set $sentinel_user_role     $upstream_http_x_sentinel_user_role;
        auth_request_set $sentinel_customer_id   $upstream_http_x_sentinel_customer_id;

        proxy_pass http://sentinel-mfdynamicsllc:7331;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Sentinel-User-Email   $sentinel_user_email;
        proxy_set_header X-Sentinel-User-Role    $sentinel_user_role;
        proxy_set_header X-Sentinel-Customer-ID  $sentinel_customer_id;
        proxy_read_timeout 300;
        proxy_buffering off;
    }

    location @login_redirect {
        return 302 http://35.255.19.236/login?next=http://$host:$server_port$request_uri;
    }
}
