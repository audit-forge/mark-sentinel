services:
  nginx:
    image: nginx:alpine
    container_name: sentinel-nginx
    ports:
      - "80:80"
      - "7001-7100:7001-7100"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    networks:
      - sentinel-net
    restart: always
    depends_on:
      - user-manager

  user-manager:
    build:
      context: ../../admin
    container_name: sentinel-admin
    environment:
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PUBLIC_IP=${PUBLIC_IP}
      - DB_PATH=/data/sentinel.db
      - MAX_CUSTOMERS=${MAX_CUSTOMERS:-0}
      - LICENSES_DIR=/licenses
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - ALERT_FROM=${ALERT_FROM:-}
      - ALERT_TO=${ALERT_TO:-}
      - MONITOR_INTERVAL_H=${MONITOR_INTERVAL_H:-24}
    volumes:
      - /opt/sentinel-data:/data
      - /opt/sentinel-secrets/admin-secret-key:/run/secrets/secret_key:ro
      - /opt/licenses:/licenses
      - /var/run/docker.sock:/var/run/docker.sock
      - ./provision_customer.sh:/app/provision_customer.sh:ro
      - ./remove_customer.sh:/app/remove_customer.sh:ro
      - ./restart_customer.sh:/app/restart_customer.sh:ro
      - ./nginx:/app/nginx
    networks:
      - sentinel-net
    restart: always

  deployer:
    build:
      context: ./deployer
    container_name: sentinel-deployer
    environment:
      - REPO_DIR=${REPO_DIR:-/opt/sentinel}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${REPO_DIR:-/opt/sentinel}:${REPO_DIR:-/opt/sentinel}
    networks:
      - sentinel-net
    restart: always

networks:
  sentinel-net:
    name: sentinel-net
    driver: bridge
